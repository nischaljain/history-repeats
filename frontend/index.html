<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>On This Day</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <main>
        <div id="loading">Loading today's history...</div>
        <div id="error" hidden></div>

        <div id="carousel" hidden>
            <div id="carousel-viewport">
                <div id="carousel-track"></div>
            </div>

            <nav id="carousel-nav">
                <button id="prev-btn" aria-label="Previous">&larr;</button>
                <div id="dots"></div>
                <button id="next-btn" aria-label="Next">&rarr;</button>
            </nav>
        </div>
    </main>

    <script src="/js/app.js"></script>
</body>
</html>
