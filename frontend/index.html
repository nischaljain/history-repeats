<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History Repeats</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <h1>History Repeats</h1>
        <p id="today-date"></p>
    </header>

    <main>
        <div id="loading">Loading today's history...</div>
        <div id="error" hidden></div>
        <div id="content" hidden>
            <section id="events-section">
                <h2>Events</h2>
                <ul id="events-list"></ul>
            </section>
            <section id="births-section">
                <h2>Births</h2>
                <ul id="births-list"></ul>
            </section>
            <section id="deaths-section">
                <h2>Deaths</h2>
                <ul id="deaths-list"></ul>
            </section>
        </div>
    </main>

    <script src="/js/app.js"></script>
</body>
</html>
